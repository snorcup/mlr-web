<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MLR Web</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎛️</text></svg>" />
  <link rel="stylesheet" href="css/style.css?v=og-rewrite-1" />
</head>
<body>
  <main class="app-shell">
    <header>
      <div>
        <p class="eyebrow">monome classic + Web Audio</p>
        <h1>MLR Web</h1>
      </div>
      <div class="status-row">
        <span id="audioStatus" class="pill warn">audio suspended</span>
        <span id="monomeStatus" class="pill">monome offline</span>
        <span id="midiStatus" class="pill">midi idle</span>
      </div>
    </header>

    <section class="controls">
      <button id="startAudio">Start audio</button>
      <button id="connectMonome">Connect monome USB</button>
      <button id="connectMidi">Enable MIDI</button>
      <label>BPM <input id="bpm" type="number" min="20" max="300" value="120" /></label>
      <input id="filePicker" type="file" accept="audio/*" multiple />
    </section>

    <section class="grid-section">
      <div id="grid" class="grid"></div>
    </section>

    <section class="tracks" id="tracks"></section>

    <section class="patterns" id="patterns"></section>

    <section class="fn-ref" id="fnRef"></section>
  </main>

  <script type="module" src="js/app.js?v=og-rewrite-1"></script>
</body>
</html>
